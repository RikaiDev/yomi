# Publishes @rikaidev/yomi to npm via OIDC Trusted Publishing — no token.
#
# One-time setup (after the first version is published manually, since npm
# cannot register a trusted publisher for a package that does not yet exist):
#   npmjs.com -> @rikaidev/yomi -> Settings -> Trusted Publisher -> GitHub Actions
#     Organization or user:  RikaiDev
#     Repository:            yomi
#     Workflow filename:     publish.yml
#     Environment:           (leave blank)
#
# Releasing is documented in RELEASING.md. In short: `npm version <bump>` (which
# also syncs src/version.ts), push with tags, then create a GitHub Release for
# that tag — this workflow runs and publishes, credential-free, with a
# provenance attestation attached automatically.
#
# Before it publishes, this workflow REFUSES to ship anything inconsistent:
# the release tag must equal package.json's version, the test suite (which
# includes the version.ts <-> package.json drift guard) must pass, and tsc
# must build cleanly. A drift fails the release instead of shipping it.
name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@v2

      - name: Verify package version matches the release tag
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          echo "package.json=$PKG  release-tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match release tag ($TAG). Bump with 'npm version' and retag."
            exit 1
          fi

      - run: bun install --frozen-lockfile
      - run: npm test          # bun test ./src — includes the version.ts <-> package.json drift guard
      - run: npm run build     # tsc must compile cleanly before we publish

      # Trusted publishing requires npm >= 11.5.1; the runner's bundled npm
      # may be older, so upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm publish
