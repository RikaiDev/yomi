# Publishes @rikaidev/yomi to npm via OIDC Trusted Publishing — no token.
#
# One-time setup (after the first version is published manually, since npm
# cannot register a trusted publisher for a package that does not yet exist):
#   npmjs.com -> @rikaidev/yomi -> Settings -> Trusted Publisher -> GitHub Actions
#     Organization or user:  RikaiDev
#     Repository:            yomi
#     Workflow filename:     publish.yml
#     Environment:           (leave blank)
#
# Then publishing is: bump "version" in package.json, tag it, and create a
# GitHub Release for that tag — this workflow runs and publishes, credential-
# free, with a provenance attestation attached automatically.
name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires npm >= 11.5.1; the runner's bundled npm
      # may be older, so upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm publish
