# CI: type-check, lint, and test.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: bun install

      - name: Type-check (tsc)
        run: bun run build

      - name: Lint (biome)
        run: bun run lint

      - name: Test (bun)
        run: bun run test

  # NOTE: there is deliberately no `npx @rikaidev/yomi` job here. That would
  # download the last PUBLISHED version rather than this commit's code, so it
  # can never fail on a regression introduced by a PR. The install path is
  # covered for real in install-smoke.yml, which packs THIS commit, installs
  # the tarball, and starts it as an MCP server.
